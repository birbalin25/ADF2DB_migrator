bundle:
  name: adf-to-databricks-migration

variables:
  catalog:
    default: main
  schema:
    default: migration

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://adb-dev.azuredatabricks.net
    variables:
      catalog: dev_catalog

  prod:
    mode: production
    workspace:
      host: https://adb-prod.azuredatabricks.net
    variables:
      catalog: prod_catalog

resources:
  jobs:
    # ---------------------------------------------------------------
    # ADF Migration Analysis Pipeline
    # Run 01 → 02 to analyze ADF ARM templates and produce
    # component mapping + dependency analysis for AI code generation.
    # ---------------------------------------------------------------
    adf_migration_analysis:
      name: ADF_Migration_Analysis_${bundle.target}
      tags:
        team: data-engineering
        purpose: adf-migration-discovery
      max_concurrent_runs: 1
      tasks:
        - task_key: component_mapping
          description: "Step 1: Parse ARM template, classify components, map to Databricks equivalents"
          notebook_task:
            notebook_path: ./notebooks/01_adf_component_mapping.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
          new_cluster:
            spark_version: "14.3.x-scala2.12"
            node_type_id: Standard_DS3_v2
            num_workers: 1

        - task_key: dependency_analysis
          description: "Step 2: Build dependency graph, assign migration phases & units"
          depends_on:
            - task_key: component_mapping
          notebook_task:
            notebook_path: ./notebooks/02_adf_dependency_analyzer.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
          new_cluster:
            spark_version: "14.3.x-scala2.12"
            node_type_id: Standard_DS3_v2
            num_workers: 1

        - task_key: code_conversion
          description: "Step 3: Generate Databricks code via Foundation Model API"
          depends_on:
            - task_key: dependency_analysis
          notebook_task:
            notebook_path: ./notebooks/03_adf_code_converter.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
          new_cluster:
            spark_version: "14.3.x-scala2.12"
            node_type_id: Standard_DS3_v2
            num_workers: 1
