bundle:
  name: adf-to-databricks-migration

variables:
  catalog:
    default: main
  schema:
    default: migration

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://adb-dev.azuredatabricks.net
    variables:
      catalog: dev_catalog

  prod:
    mode: production
    workspace:
      host: https://adb-984752964297111.11.azuredatabricks.net
      root_path: /Workspace/Users/birbal.das@databricks.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: bircatalog

resources:
  jobs:
    # ---------------------------------------------------------------
    # ADF Migration Analysis Pipeline
    # Run 01 → 02 to analyze ADF ARM templates and produce
    # component mapping + dependency analysis for AI code generation.
    # ---------------------------------------------------------------
    adf_migration_analysis:
      name: ADF_Migration_Analysis_${bundle.target}
      tags:
        team: data-engineering
        purpose: adf-migration-discovery
      max_concurrent_runs: 1
      tasks:
        - task_key: component_mapping
          description: "Step 1: Parse ARM template, classify components, map to Databricks equivalents"
          notebook_task:
            notebook_path: ./notebooks/02_adf2db_mapping.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
          environment_key: default

        - task_key: dependency_analysis
          description: "Step 2: Build dependency graph, assign migration phases & units"
          depends_on:
            - task_key: component_mapping
          notebook_task:
            notebook_path: ./notebooks/01_adf_analyzer.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
          environment_key: default

      environments:
        - environment_key: default
          spec:
            client: "1"
